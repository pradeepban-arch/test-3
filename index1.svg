<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" style="background: #111;">
  <!-- Enlarged bounds to handle the game menu and dual canvas blocks -->
  <foreignObject x="0" y="0" width="1280" height="720">
    
    <!-- Added sandbox parameters to permit the embedded JS game files to execute -->
    <iframe 
      src="data:text/html;base64, " 
      width="100%" 
      height="100%" 
      style="border:none;"
      sandbox="allow-scripts allow-same-origin allow-forms">
    </iframe>

  </foreignObject>
</svg>

